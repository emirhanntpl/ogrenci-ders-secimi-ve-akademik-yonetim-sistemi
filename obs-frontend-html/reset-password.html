<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTÜ BYS - Şifre Sıfırlama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.7);
            z-index: -1;
        }
        .login-container { position: relative; z-index: 10; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="login-container max-w-md w-full bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border border-slate-100 p-8">
        <div class="text-center mb-8">
            <div class="inline-flex p-4 bg-blue-50 rounded-2xl text-blue-600 mb-4 shadow-inner">
                <i class="fas fa-key fa-3x"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter italic mb-2">Yeni Şifre Belirle</h1>
            <p class="text-sm text-slate-500 font-medium">Lütfen yeni şifrenizi girin.</p>
        </div>

        <form id="resetPasswordForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Yeni Şifre</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><i class="fas fa-lock"></i></span>
                    <input type="password" id="newPassword" required class="w-full pl-10 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none font-medium" placeholder="••••••••">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Yeni Şifre (Tekrar)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><i class="fas fa-lock"></i></span>
                    <input type="password" id="confirmPassword" required class="w-full pl-10 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none font-medium" placeholder="••••••••">
                </div>
            </div>

            <div id="messageBox" class="hidden text-sm font-bold text-center p-4 rounded-xl"></div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-500/30 transition-all">
                Şifreyi Güncelle
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm font-bold text-slate-500 hover:text-blue-600 transition-colors"><i class="fas fa-arrow-left mr-1"></i> Giriş Sayfasına Dön</a>
        </div>
    </div>

    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageBox = document.getElementById('messageBox');
            const submitBtn = document.getElementById('submitBtn');

            // URL'den token'ı al
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                showMessage('Geçersiz bağlantı. Şifre sıfırlama linki eksik veya hatalı.', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('Şifreler eşleşmiyor!', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('Şifre en az 6 karakter olmalıdır.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Güncelleniyor...';

            try {
                const response = await fetch('http://localhost:8080/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message || 'Şifreniz başarıyla güncellendi. Giriş sayfasına yönlendiriliyorsunuz...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                } else {
                    showMessage(data.message || 'Bir hata oluştu.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Şifreyi Güncelle';
                }
            } catch (err) {
                showMessage('Sunucuya bağlanılamadı. Lütfen tekrar deneyin.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Şifreyi Güncelle';
            }
        });

        function showMessage(message, type) {
            const box = document.getElementById('messageBox');
            box.innerText = message;
            box.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'bg-emerald-50', 'text-emerald-600');

            if (type === 'error') {
                box.classList.add('bg-red-50', 'text-red-600');
            } else {
                box.classList.add('bg-emerald-50', 'text-emerald-600');
            }
        }
    </script>
</body>
</html>
