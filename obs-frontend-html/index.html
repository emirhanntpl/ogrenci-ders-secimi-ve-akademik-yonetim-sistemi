<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTÜ BYS - Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; }

        /* Arka plan resmi ve overlay stili eklendi */
        body {
            /* Güvenilir ve her zaman çalışan bir kampüs görseli ile değiştirildi */
            background-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }

        /* Arka planı biraz karartmak için overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.7); /* slate-900 renginin saydam hali */
            z-index: -1;
        }

        /* Giriş formunun z-index'ini ayarlayarak overlay'in üstünde kalmasını sağla */
        .login-container {
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <!-- bg-slate-900 body class'ından çıkarıldı ve login-container class'ı eklendi -->
    <div class="login-container max-w-md w-full bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl overflow-hidden border border-slate-100">
        <div class="p-8">
            <div class="text-center mb-8">
                <div class="inline-flex p-4 bg-blue-50 rounded-2xl text-blue-600 mb-4 shadow-inner">
                    <i class="fas fa-graduation-cap fa-3x"></i>
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tighter italic">KTÜ BYS</h1>
                <p class="text-slate-500 mt-2 font-medium">Akademik Bilgi Yönetim Sistemi</p>
            </div>

            <!-- Giriş Tipi Sekmeleri -->
            <div class="flex border-b border-slate-100 mb-6">
                <button id="studentTab" onclick="switchTab('STUDENT')" class="flex-1 py-3 font-black text-[11px] uppercase tracking-widest tab-active transition-all">Öğrenci Girişi</button>
                <button id="staffTab" onclick="switchTab('STAFF')" class="flex-1 py-3 font-black text-[11px] uppercase tracking-widest text-slate-400 hover:text-slate-600 transition-all">Personel Girişi</button>
            </div>

            <form id="loginForm" class="space-y-6">
                <input type="hidden" id="loginType" value="STUDENT">
                <div>
                    <label id="usernameLabel" for="username" class="block text-xs font-black uppercase text-slate-500 mb-2 tracking-widest">Öğrenci Numarası</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i id="userIcon" class="fas fa-user-graduate text-lg"></i>
                        </span>
                        <input type="text" id="username" required
                            class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-bold text-slate-700"
                            placeholder="Örn: 445909">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-xs font-black uppercase text-slate-500 mb-2 tracking-widest">Şifre</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fas fa-lock text-lg"></i>
                        </span>
                        <input type="password" id="password" required
                            class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-bold text-slate-700"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex justify-end">
                    <button type="button" onclick="openForgotPasswordModal()" class="text-xs font-bold text-blue-600 hover:text-blue-800 transition-colors">
                        Şifremi Unuttum
                    </button>
                </div>

                <div id="errorMessage" class="bg-red-50 text-red-600 text-xs font-bold p-4 rounded-xl text-center hidden border border-red-100 italic"></div>

                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-500/30 transition-all flex items-center justify-center gap-3 uppercase tracking-tighter italic">
                    <i class="fas fa-sign-in-alt"></i>
                    Sisteme Giriş Yap
                </button>
            </form>
        </div>
        <div class="bg-slate-50/80 p-6 text-center border-t border-slate-100">
            <span class="text-[10px] text-slate-500 font-black uppercase tracking-[0.2em]">KTÜ Akademik Portal v2.0.4</span>
        </div>
    </div>

    <!-- Şifremi Unuttum Modalı -->
    <div id="forgotPasswordModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-3xl max-w-sm w-full p-8 shadow-2xl">
            <h3 class="text-2xl font-black mb-4 italic text-slate-800 text-center">Şifremi Unuttum</h3>
            <p class="text-sm text-slate-500 text-center mb-6 font-medium">Sisteme kayıtlı öğrenci numaranızı girin. Şifre sıfırlama bağlantısı e-posta adresinize gönderilecektir.</p>

            <form id="forgotPasswordForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Öğrenci Numarası</label>
                    <input type="text" id="resetStudentNumber" required class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none font-medium" placeholder="Örn: 445909">
                </div>

                <div id="forgotPasswordMessage" class="hidden text-sm font-bold text-center p-3 rounded-xl"></div>

                <div class="pt-2 flex gap-3">
                    <button type="button" onclick="closeForgotPasswordModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200 transition-colors">İptal</button>
                    <button type="submit" id="forgotPasswordSubmitBtn" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center gap-2">
                        <span>Gönder</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function switchTab(type) {
            const studentTab = document.getElementById('studentTab');
            const staffTab = document.getElementById('staffTab');
            const loginType = document.getElementById('loginType');
            const usernameInput = document.getElementById('username');
            const usernameLabel = document.getElementById('usernameLabel');
            const userIcon = document.getElementById('userIcon');
            const errorDiv = document.getElementById('errorMessage');

            loginType.value = type;
            usernameInput.value = '';
            errorDiv.classList.add('hidden');

            if (type === 'STUDENT') {
                studentTab.classList.add('tab-active');
                staffTab.classList.remove('tab-active');
                staffTab.classList.add('text-slate-400');

                usernameInput.type = 'text'; // Öğrenci numarası da artık string olabilir
                usernameInput.placeholder = 'Örn: 445909';
                usernameLabel.innerText = 'Öğrenci Numarası';
                userIcon.className = 'fas fa-user-graduate text-lg';
            } else {
                staffTab.classList.add('tab-active');
                studentTab.classList.remove('tab-active');
                studentTab.classList.add('text-slate-400');

                usernameInput.type = 'text';
                usernameInput.placeholder = 'Kullanıcı Adı veya Sicil No';
                usernameLabel.innerText = 'Personel Kullanıcı Adı / Sicil';
                userIcon.className = 'fas fa-user-tie text-lg';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.toString().trim();
            const password = document.getElementById('password').value;
            const loginType = document.getElementById('loginType').value; // loginType'ı alıyoruz
            const errorDiv = document.getElementById('errorMessage');

            try {
                const response = await fetch('http://localhost:8080/authenticate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, loginType }) // loginType'ı body'ye ekliyoruz
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.accessToken);
                    localStorage.setItem('username', username);
                    localStorage.setItem('userRole', data.role);

                    if (data.role === 'STUDENT') {
                        window.location.href = 'student-dashboard.html'; // Öğrenci paneline yönlendir
                    } else if (data.role === 'TEACHER') {
                        window.location.href = 'teacher-dashboard.html'; // Öğretmen paneline yönlendir
                    } else {
                        window.location.href = 'dashboard.html'; // Diğer roller (ADMIN, USER) için admin paneli
                    }
                } else {
                    errorDiv.innerText = data.message || 'KİMLİK DOĞRULAMA BAŞARISIZ! BİLGİLERİNİZİ KONTROL EDİN.';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.innerText = 'SUNUCU BAĞLANTI HATASI! LÜTFEN SİSTEM YÖNETİCİSİ İLE İLETİŞİME GEÇİN.';
                errorDiv.classList.remove('hidden');
            }
        });

        // Şifremi Unuttum İşlemleri
        function openForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.remove('hidden');
            document.getElementById('forgotPasswordModal').classList.add('flex');
            document.getElementById('forgotPasswordMessage').classList.add('hidden');
            document.getElementById('resetStudentNumber').value = '';
        }

        function closeForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.add('hidden');
            document.getElementById('forgotPasswordModal').classList.remove('flex');
        }

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const studentNumber = document.getElementById('resetStudentNumber').value.trim();
            const messageDiv = document.getElementById('forgotPasswordMessage');
            const submitBtn = document.getElementById('forgotPasswordSubmitBtn');

            if (!studentNumber) return;

            // Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> İşleniyor...';
            messageDiv.classList.add('hidden');

            try {
                const response = await fetch('http://localhost:8080/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ studentNumber })
                });

                const data = await response.json();

                messageDiv.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'bg-emerald-50', 'text-emerald-600');

                if (response.ok) {
                    messageDiv.classList.add('bg-emerald-50', 'text-emerald-600');
                    messageDiv.innerText = data.message || 'Şifre sıfırlama bağlantısı e-posta adresinize gönderildi.';
                    // Modal'ı 3 saniye sonra kapat
                    setTimeout(closeForgotPasswordModal, 3000);
                } else {
                    messageDiv.classList.add('bg-red-50', 'text-red-600');
                    messageDiv.innerText = data.message || 'Bir hata oluştu.';
                }
            } catch (err) {
                messageDiv.classList.remove('hidden');
                messageDiv.classList.add('bg-red-50', 'text-red-600');
                messageDiv.innerText = 'Sunucuya bağlanılamadı. Lütfen daha sonra tekrar deneyin.';
            } finally {
                // Reset button state
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Gönder</span>';
            }
        });
    </script>
</body>
</html>
