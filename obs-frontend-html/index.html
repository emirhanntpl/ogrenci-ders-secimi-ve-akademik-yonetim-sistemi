<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTÜ BYS - Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
        <div class="p-8">
            <div class="text-center mb-10">
                <div class="inline-flex p-4 bg-blue-50 rounded-2xl text-blue-600 mb-4">
                    <i class="fas fa-graduation-cap fa-3x"></i>
                </div>
                <h1 class="text-3xl font-bold text-slate-800">KTÜ BYS</h1>
                <p class="text-slate-500 mt-2">Öğrenci Bilgi Yönetim Sistemi</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Kullanıcı Adı (Sayısal Giriş)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fas fa-user"></i>
                        </span>
                        <!-- type="number" ve pattern ile sadece rakam girişine zorluyoruz -->
                        <input type="number" id="username" required min="1"
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                            placeholder="Örn: 445909">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Şifre</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password" required
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <div id="errorMessage" class="text-red-500 text-sm text-center hidden"></div>

                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-sign-in-alt"></i>
                    Giriş Yap
                </button>
            </form>
        </div>
        <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
            <span class="text-xs text-slate-400 font-medium uppercase tracking-widest">Akademik Yönetim Sistemi v1.0</span>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            // ToString'e çeviriyoruz çünkü backend username alanını String bekliyor (Modelde private String username;)
            const username = document.getElementById('username').value.toString();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            // Regex ile fazladan bir güvenlik: Sadece rakam içerdiğinden emin oluyoruz (Boşluk vs. olmasın)
            if (!/^\d+$/.test(username)) {
                errorDiv.innerText = 'Kullanıcı adı sadece rakamlardan oluşmalıdır!';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('http://localhost:8080/authenticate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.accessToken);
                    localStorage.setItem('username', username);
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.innerText = 'Giriş başarısız! Bilgilerinizi kontrol edin.';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.innerText = 'Sunucuya bağlanılamadı!';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
